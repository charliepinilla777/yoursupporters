<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
  <!-- Fondo oscuro elegante -->
  <rect width="200" height="200" fill="#0b0b0f"/>
  
  <!-- Cartera Hermès roja con detalles dorados -->
  <g transform="translate(50, 40) scale(0.8)">
    <!-- Sombra de la cartera -->
    <ellipse cx="50" cy="65" rx="35" ry="8" fill="rgba(0,0,0,0.4)" opacity="0.6"/>
    
    <!-- Cuerpo principal de la cartera -->
    <rect x="20" y="25" width="60" height="40" rx="3" fill="#c41e3a" stroke="#d4af37" stroke-width="0.8"/>
    
    <!-- Detalle de costura -->
    <rect x="25" y="30" width="50" height="30" rx="2" fill="#a01729" opacity="0.4"/>
    
    <!-- Cierre Hermès -->
    <rect x="45" y="20" width="10" height="8" rx="1" fill="#d4af37"/>
    <circle cx="50" cy="24" r="2" fill="#c41e3a"/>
    
    <!-- Logo "H" de Hermès -->
    <text x="50" y="45" font-family="Georgia, serif" font-size="8" fill="#d4af37" text-anchor="middle" font-weight="bold">H</text>
    
    <!-- Detalle de palillo dorado -->
    <rect x="48" y="48" width="4" height="15" rx="0.5" fill="#d4af37" opacity="0.8"/>
  </g>
  
  <!-- Esferos de mujer elegantemente distribuidos -->
  <g opacity="0.15">
    <!-- Esfero 1 - estilo ejecutivo -->
    <g transform="translate(120, 30)">
      <rect x="0" y="0" width="3" height="25" rx="0.5" fill="#d4af37"/>
      <circle cx="1.5" cy="2" r="1.5" fill="#d4af37"/>
      <rect x="0.5" y="20" width="1" height="5" fill="#d4af37" opacity="0.6"/>
    </g>
    
    <!-- Esfero 2 - estilo vintage -->
    <g transform="translate(140, 60)">
      <rect x="0" y="0" width="2.5" height="22" rx="0.3" fill="#c0c0c0"/>
      <circle cx="1.25" cy="2" r="1.2" fill="#d4af37"/>
      <rect x="0.3" y="18" width="0.8" height="4" fill="#c0c0c0" opacity="0.7"/>
    </g>
    
    <!-- Esfero 3 - estilo moderno -->
    <g transform="translate(30, 120)">
      <rect x="0" y="0" width="2.8" height="24" rx="0.4" fill="#1a1a1a"/>
      <circle cx="1.4" cy="2" r="1.3" fill="#d4af37"/>
      <rect x="0.4" y="19" width="0.9" height="5" fill="#1a1a1a" opacity="0.8"/>
    </g>
    
    <!-- Esfero 4 - estilo lujoso -->
    <g transform="translate(160, 140)">
      <rect x="0" y="0" width="3.2" height="26" rx="0.5" fill="#d4af37"/>
      <circle cx="1.6" cy="2.5" r="1.6" fill="#c41e3a"/>
      <rect x="0.6" y="21" width="1" height="5" fill="#d4af37" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Elementos decorativos góticos -->
  <g opacity="0.08">
    <!-- Ornamento superior izquierdo -->
    <path d="M10 10 Q20 5 30 10 T50 10" stroke="#d4af37" stroke-width="0.5" fill="none"/>
    <circle cx="10" cy="10" r="1" fill="#d4af37"/>
    <circle cx="30" cy="8" r="0.8" fill="#d4af37"/>
    <circle cx="50" cy="10" r="1" fill="#d4af37"/>
    
    <!-- Ornamento superior derecho -->
    <path d="M150 15 Q160 10 170 15 T190 15" stroke="#d4af37" stroke-width="0.5" fill="none"/>
    <circle cx="150" cy="15" r="1" fill="#d4af37"/>
    <circle cx="170" cy="13" r="0.8" fill="#d4af37"/>
    <circle cx="190" cy="15" r="1" fill="#d4af37"/>
    
    <!-- Ornamento inferior izquierdo -->
    <path d="M15 170 Q25 165 35 170 T55 170" stroke="#d4af37" stroke-width="0.5" fill="none"/>
    <circle cx="15" cy="170" r="1" fill="#d4af37"/>
    <circle cx="35" cy="168" r="0.8" fill="#d4af37"/>
    <circle cx="55" cy="170" r="1" fill="#d4af37"/>
    
    <!-- Ornamento inferior derecho -->
    <path d="M145 175 Q155 170 165 175 T185 175" stroke="#d4af37" stroke-width="0.5" fill="none"/>
    <circle cx="145" cy="175" r="1" fill="#d4af37"/>
    <circle cx="165" cy="173" r="0.8" fill="#d4af37"/>
    <circle cx="185" cy="175" r="1" fill="#d4af37"/>
  </g>
  
  <!-- Sutil brillo dorado -->
  <ellipse cx="100" cy="100" rx="80" ry="60" fill="url(#goldGlow)" opacity="0.05"/>
  
  <!-- Definiciones de gradientes -->
  <defs>
    <radialGradient id="goldGlow">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
