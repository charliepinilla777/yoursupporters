<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" patternUnits="userSpaceOnUse">
  <!-- Fondo marrón Louis Vuitton -->
  <rect width="100" height="100" fill="#c8a882"/>
  
  <!-- Patrón LV -->
  <g fill="#d4b896" opacity="0.6">
    <!-- Monograma LV -->
    <g transform="translate(10, 10)">
      <path d="M8 2 L8 12 L6 12 L6 4 L4 4 L4 2 Z" fill="#d4b896"/>
      <path d="M10 2 L14 2 L14 4 L12 4 L12 8 L14 8 L14 10 L12 10 L12 12 L10 12 Z" fill="#d4b896"/>
      <circle cx="7" cy="7" r="1" fill="#d4b896"/>
    </g>
    
    <!-- Flor de 4 pétalos -->
    <g transform="translate(30, 15)">
      <circle cx="0" cy="-2" r="1.5" fill="#d4b896"/>
      <circle cx="2" cy="0" r="1.5" fill="#d4b896"/>
      <circle cx="0" cy="2" r="1.5" fill="#d4b896"/>
      <circle cx="-2" cy="0" r="1.5" fill="#d4b896"/>
      <circle cx="0" cy="0" r="1" fill="#c8a882"/>
    </g>
    
    <!-- Estrella de 4 puntas -->
    <g transform="translate(50, 10)">
      <path d="M0,-3 L1,0 L0,3 L-1,0 Z" fill="#d4b896"/>
      <path d="M-3,0 L0,-1 L3,0 L0,1 Z" fill="#d4b896"/>
    </g>
    
    <!-- Segundo monograma -->
    <g transform="translate(70, 15)">
      <path d="M8 2 L8 12 L6 12 L6 4 L4 4 L4 2 Z" fill="#d4b896"/>
      <path d="M10 2 L14 2 L14 4 L12 4 L12 8 L14 8 L14 10 L12 10 L12 12 L10 12 Z" fill="#d4b896"/>
      <circle cx="7" cy="7" r="1" fill="#d4b896"/>
    </g>
    
    <!-- Más elementos decorativos -->
    <g transform="translate(20, 40)">
      <circle cx="0" cy="-2" r="1.5" fill="#d4b896"/>
      <circle cx="2" cy="0" r="1.5" fill="#d4b896"/>
      <circle cx="0" cy="2" r="1.5" fill="#d4b896"/>
      <circle cx="-2" cy="0" r="1.5" fill="#d4b896"/>
      <circle cx="0" cy="0" r="1" fill="#c8a882"/>
    </g>
    
    <g transform="translate(60, 45)">
      <path d="M0,-3 L1,0 L0,3 L-1,0 Z" fill="#d4b896"/>
      <path d="M-3,0 L0,-1 L3,0 L0,1 Z" fill="#d4b896"/>
    </g>
    
    <g transform="translate(40, 60)">
      <path d="M8 2 L8 12 L6 12 L6 4 L4 4 L4 2 Z" fill="#d4b896"/>
      <path d="M10 2 L14 2 L14 4 L12 4 L12 8 L14 8 L14 10 L12 10 L12 12 L10 12 Z" fill="#d4b896"/>
      <circle cx="7" cy="7" r="1" fill="#d4b896"/>
    </g>
    
    <!-- Elementos inferiores -->
    <g transform="translate(15, 75)">
      <circle cx="0" cy="-2" r="1.5" fill="#d4b896"/>
      <circle cx="2" cy="0" r="1.5" fill="#d4b896"/>
      <circle cx="0" cy="2" r="1.5" fill="#d4b896"/>
      <circle cx="-2" cy="0" r="1.5" fill="#d4b896"/>
      <circle cx="0" cy="0" r="1" fill="#c8a882"/>
    </g>
    
    <g transform="translate(55, 80)">
      <path d="M0,-3 L1,0 L0,3 L-1,0 Z" fill="#d4b896"/>
      <path d="M-3,0 L0,-1 L3,0 L0,1 Z" fill="#d4b896"/>
    </g>
    
    <g transform="translate(80, 70)">
      <path d="M8 2 L8 12 L6 12 L6 4 L4 4 L4 2 Z" fill="#d4b896"/>
      <path d="M10 2 L14 2 L14 4 L12 4 L12 8 L14 8 L14 10 L12 10 L12 12 L10 12 Z" fill="#d4b896"/>
      <circle cx="7" cy="7" r="1" fill="#d4b896"/>
    </g>
  </g>
  
  <!-- Sutil textura -->
  <rect width="100" height="100" fill="url(#lvTexture)" opacity="0.1"/>
  
  <defs>
    <pattern id="lvTexture" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#d4b896" opacity="0.3"/>
    </pattern>
  </defs>
</svg>
